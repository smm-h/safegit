# Version bump type: patch, minor, or major
bump = "patch"
# Short description of this release (required)
description = "Fix scrub data loss for tracked+gitignored files, fix doctor dry-run submodule reporting, add unlock --dry-run."
# Optional context explaining why these changes were made
context = """
The v0.16.0 working-tree sync (read-tree --reset -u) could overwrite tracked+gitignored files \
(e.g., config files with runtime secrets that were committed by mistake then gitignored). \
SyncMainIndexWithWorktree now saves and restores their content, then untracks them. \
Also fixed doctor --fix --dry-run not reporting submodule state, and added --dry-run support to unlock."""
include = ["go", "docker"]
exclude = []
