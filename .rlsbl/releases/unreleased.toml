# Version bump type: patch, minor, or major
bump = "patch"
# Short description of this release (required)
description = "Fix macOS symlink bug in submodule detection."
# Optional context explaining why these changes were made
context = """
DetectParent compared symlink-resolved paths from git with unresolved paths from os.Getwd(), \
causing filepath.Rel to produce incorrect relative paths on macOS where /var -> /private/var. \
This broke autobump and push-hook-cascade on macOS since v0.15.0."""
include = ["go", "docker"]
exclude = []
