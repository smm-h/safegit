# Version bump type: patch, minor, major, hotfix, or prerelease
bump = "minor"
# Short description of this release (required)
description = "Scan DRY consolidation, unified scrub execution, os.Chdir elimination, tracked policy files"
# Optional context explaining why these changes were made
context = """
Internal architecture improvements and one breaking change.

The scan package was consolidated from 6 nearly-identical functions to a unified ScanOpts-based API. \
scrub match now delegates to the shared recipe execution engine (executeScrubRecipe), eliminating \
~300 lines of duplicated orchestration. scrub verify scans the object store once for all policies \
instead of once per policy.

All 24 os.Chdir calls in submodule processing were replaced with context-scoped git directories \
(git.WithDir). Git commands now target the correct repository via context values, not process-wide \
CWD mutation.

Scrub policy files moved from .git/safegit/ (hidden, per-worktree) to .safegit/ (tracked, \
committed, portable across clones). Existing repos auto-migrate on first read. This is a breaking \
change for tooling that reads the old location directly.

strictcli upgraded from v0.9.0 to v0.16.2. JSON-producing commands are tagged in the CLI schema.
"""
