description = "Add rewrite-author --json, range-scoped dry-run scanning, JSON error safety net, splitNonEmpty consolidation."
# Optional context explaining why these changes were made
context = """
Range-scoped dry-run uses git rev-list --objects to scan only range-reachable objects instead of the entire store. \
rewrite-author now supports --json for both execute and dry-run modes. \
die() emits JSON error objects when --json is active, and mustGitDir routes through die() for coverage. \
splitNonEmpty consolidated from two implementations into a single exported git.SplitNonEmpty."""
