name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    env:
      GIT_CONFIG_COUNT: 1
      GIT_CONFIG_KEY_0: protocol.file.allow
      GIT_CONFIG_VALUE_0: always
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test ./... ${{ matrix.os == 'ubuntu-latest' && '-race' || '' }} -short -timeout=10m
